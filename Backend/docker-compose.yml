version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db-container
    environment:
      MYSQL_ROOT_PASSWORD: mysql123456
      MYSQL_DATABASE: my_db
      MYSQL_USER: user1
      MYSQL_PASSWORD: mysql123456
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: backend-phpmyadmin
    links:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    restart: always

  chromadb:
    image: chromadb/chroma
    container_name: chromadb-server
    volumes:
      - ./fastapi/app/services/llm/chroma_db:/data
    environment:
      - PERSIST_DIRECTORY=/data
      - IS_PERSISTENT=TRUE
    ports:
      - "4000:8000"

  mongodb:
    image: mongo:latest
    container_name: mongodb-server
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db
  
  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    environment:
      - NGROK_AUTHTOKEN=3CDBJP5aefe9Hu6cH4OsJH9zAdm_5ad5EK1K7VrBjru3fvA8L
    command:
      - "http"
      - "--url=snuff-statue-purgatory.ngrok-free.dev"
      - "backend-api:8000"
    depends_on:
      - backend-api
    
  # --- 3. FastAPI (เพิ่มเข้าไป) ---
  backend-api:
    build:
      context: . # เพราะ Dockerfile อยู่ในโฟลเดอร์ Backend เดียวกับไฟล์นี้
      dockerfile: Dockerfile
    container_name: fastapi-server
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - chromadb
    # ถ้ามีไฟล์ .env ในโฟลเดอร์ fastapi ให้ดึงมาใช้
    env_file:
      - ./fastapi/.env
    environment:
      - DATABASE_URL=mysql+pymysql://user1:mysql123456@mysql:3306/my_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    deploy:
      resources:
        limits:
          memory: 4G # เพดานสูงสุด
        reservations:
          memory: 2G # การันตีว่าต้องได้เท่านี้

  # --- 4. React Frontend (เพิ่มเข้าไป) ---
  frontend:
    build:
      context: ../Frontend # ถอยออกไป 1 ชั้นแล้วเข้าโฟลเดอร์ Frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    ports:
      - "5173:80"         # Map เข้าพอร์ต 5173 ตามที่ CORS ตั้งไว้
    depends_on:
      - backend-api